name: Tests

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install ripgrep (VAL-04 guard uses rg)
        run: sudo apt-get update -qq && sudo apt-get install -y ripgrep

      - name: Phase 40 VAL-04 guard (jellyswipe/ only)
        run: bash scripts/phase40_val04_guard.sh

      - name: Run tests
        run: uv run pytest tests/
