services:
  jelly-swipe:
    image: andrewthetechie/jelly-swipe:latest
    container_name: jelly-swipe
    ports:
      - "5005:5005"
    environment:
      # Jellyfin-only configuration
      - JELLYFIN_URL=http://your-jellyfin-host:8096
      - JELLYFIN_API_KEY=your-jellyfin-api-key
      # Alternatively, use username/password authentication:
      # - JELLYFIN_USERNAME=your-username
      # - JELLYFIN_PASSWORD=your-password
      - FLASK_SECRET=pick-a-random-string
      - TMDB_API_KEY=your-tmdb-v3-key
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
