services:
  kino-swipe:
    build: ghcr.io/bergasha/kino-swipe:latest
    container_name: kino-swipe
    ports:
      - "5005:5005"
    environment:
      # MEDIA_PROVIDER=plex   # default; set to jellyfin for Jellyfin-only env (see README)
      - PLEX_URL=https://your-plex-ip:32400
      - PLEX_TOKEN=your-plex-token-here
      - FLASK_SECRET=pick-a-random-string
      - TMDB_API_KEY=your-tmdb-v3-key
      # Jellyfin (uncomment when MEDIA_PROVIDER=jellyfin — see README for full list):
      # - JELLYFIN_URL=http://your-jellyfin:8096
      # - JELLYFIN_API_KEY=your-api-key
      # - JELLYFIN_USERNAME=
      # - JELLYFIN_PASSWORD=
    volumes:
      - ./data:/app/data
      - ./static:/app/static
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"