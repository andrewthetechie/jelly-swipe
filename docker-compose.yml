services:
  jelly-swipe:
    image: ghcr.io/andrewthetechie/jelly-swipe:v0.5.0 # Pin to a release. :latest tracks main and may include unreleased changes.
    container_name: jelly-swipe
    ports:
      - "5005:5005"
    environment:
      - JELLYFIN_URL=http://your-jellyfin-host:8096
      - JELLYFIN_API_KEY=your-jellyfin-api-key
      - SESSION_SECRET=pick-a-random-string
      - TMDB_ACCESS_TOKEN=your-tmdb-read-access-token
      - PUID=99 # UID for app process — match your ./data directory owner
      - PGID=100 # GID for app process — match your ./data directory owner
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
