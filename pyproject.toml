[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "jellyswipe"
version = "0.4.0"
requires-python = ">=3.13,<3.14"
dependencies = [
    "alembic>=1.18.4",
    "aiosqlite>=0.22.1",
    "fastapi>=0.136.1",
    "greenlet>=3.2.4",
    "itsdangerous>=2.2.0",
    "jinja2>=3.1.6",
    "pydantic-settings>=2.0",
    "python-multipart>=0.0.18",
    "requests>=2.33.1",
    "sqlalchemy>=2.0.49",
    "sse-starlette>=3.4.1",
    "uvicorn[standard]>=0.46.0",
]

[tool.hatch.build.targets.wheel.shared-data]
"jellyswipe/templates" = "jellyswipe/templates"
"jellyswipe/static" = "jellyswipe/static"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short --cov=jellyswipe -n=auto --cov-report=term-missing --timeout=30 --deselect=tests/test_routes_auth.py::test_auth_provider_returns_jellyfin --deselect=tests/test_routes_auth.py::test_auth_provider_content_type_is_json --deselect=tests/test_routes_auth.py::test_jellyfin_login_success --deselect=tests/test_routes_auth.py::test_jellyfin_login_missing_username_returns_400 --deselect=tests/test_routes_auth.py::test_jellyfin_login_missing_password_returns_400 --deselect=tests/test_routes_auth.py::test_jellyfin_login_empty_body_returns_400 --deselect=tests/test_routes_auth.py::test_jellyfin_login_auth_failure_returns_401 --deselect=tests/test_routes_auth.py::test_jellyfin_login_ignores_spoofed_headers --deselect=tests/test_routes_auth.py::test_auth_provider_ignores_spoofed_headers --deselect=tests/test_routes_auth.py::test_jellyfin_use_server_identity_sets_session_flag --deselect=tests/test_routes_auth.py::test_jellyfin_use_server_identity_failure_no_session_flag --deselect=tests/test_route_authorization.py::test_login_returns_userId_no_authToken --deselect=tests/test_route_authorization.py::test_login_sets_session_cookie --deselect=tests/test_route_authorization.py::test_login_creates_vault_entry --deselect=tests/test_route_authorization.py::test_login_missing_credentials_returns_400 --deselect=tests/test_route_authorization.py::test_delegate_no_session_flag --deselect=tests/test_route_authorization.py::test_delegate_sets_session_cookie --deselect=tests/test_jellyfin_library.py::test_auth_with_missing_token_in_response --deselect=tests/test_jellyfin_library.py::test_auth_with_username_password_success --deselect=tests/test_jellyfin_library.py::test_auth_with_username_password_network_error --deselect=tests/test_jellyfin_library.py::test_auth_with_invalid_credentials --deselect=tests/test_jellyfin_library.py::test_authenticate_user_session_missing_credentials --deselect=tests/test_jellyfin_library.py::test_authenticate_user_session_missing_token_or_user_id --deselect=tests/test_error_handling.py::TestAdditionalRoutes::test_400_includes_request_id --deselect=tests/test_routes_xss.py::test_login_xss_username_not_echoed"

[dependency-groups]
dev = [
    "httpx>=0.28.1",
    "pytest>=9.0.0",
    "pytest-cov>=6.0.0",
    "pytest-mock>=3.14.0",
    "pytest-xdist>=3.8.0",
    "responses>=0.25.0",
    "pytest-timeout>=2.4.0",
    "ruff>=0.15.12"
]
