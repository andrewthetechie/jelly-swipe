[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "jellyswipe"
version = "0.1.0"
requires-python = ">=3.13,<3.14"
dependencies = [
    "flask>=3.1.3",
    "gevent>=24.0",
    "gunicorn>=25.3.0",
    "plexapi>=4.18.1",
    "python-dotenv>=1.2.2",
    "requests>=2.33.1",
    "werkzeug>=3.1.8",
]

[tool.hatch.build.targets.wheel.shared-data]
"jellyswipe/templates" = "jellyswipe/templates"
"jellyswipe/static" = "jellyswipe/static"
